<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JOJO — STAND WHEEL | Анкета стенда</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Special+Elite&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0f0a0c, #050305);
            font-family: 'Oswald', sans-serif;
            padding: 30px 20px;
            color: #e6d5b8;
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* главная карточка стенда */
        .stand-card {
            background: linear-gradient(145deg, #18121e, #0c0810);
            border: 3px double #e6b422;
            padding: 30px;
            box-shadow: 20px 20px 0 #5a1e1e, 0 0 0 4px #ffda77, inset 0 0 30px rgba(230,180,34,0.15);
            position: relative;
        }

        .jojo-tag {
            font-family: 'Special Elite', monospace;
            background: #e6b422;
            color: #110a10;
            display: inline-block;
            padding: 5px 28px;
            position: absolute;
            top: -18px;
            left: 40px;
            font-weight: bold;
            letter-spacing: 3px;
            box-shadow: 6px 6px 0 #4a1818;
        }

        /* колесо стенда — canvas */
        .wheel-container {
            display: flex;
            justify-content: center;
            margin: 20px 0 30px;
        }
        canvas {
            background: #0a0610;
            border-radius: 50%;
            box-shadow: 0 0 0 6px #e6b42244, 0 0 0 12px #2c1420, 0 10px 35px black;
            max-width: 100%;
            height: auto;
            cursor: pointer;
        }

        /* панель управления статами */
        .stats-control {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 25px 0 20px;
        }
        .stat-control-item {
            background: #140e16;
            border-left: 6px solid #e6b422;
            padding: 10px 18px;
            min-width: 130px;
            text-align: center;
        }
        .stat-label {
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: #ffdd99;
        }
        .stat-value-select {
            background: #241e28;
            color: #ffcd7e;
            border: 1px solid #e6b422;
            padding: 6px 12px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
            font-family: monospace;
            text-align: center;
        }

        .other-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 30px;
        }
        .info-area {
            flex: 1;
            background: #0c0812cc;
            padding: 18px;
            backdrop-filter: blur(4px);
        }
        .resource {
            margin: 12px 0;
        }
        .resource input {
            background: #1f1722;
            border: none;
            border-bottom: 2px solid #e6b422;
            width: 80px;
            font-size: 1.2rem;
            color: #ffdfaa;
            font-weight: bold;
        }
        .kd-stand {
            background: #00000077;
            padding: 12px;
            border-left: 5px solid #e6b422;
            font-family: monospace;
            margin: 15px 0;
        }
        .jojo-btn {
            background: #2e1e26;
            border: 1px solid #e6b422;
            color: #ffeaac;
            padding: 8px 18px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.15s;
            margin: 5px 5px 0 0;
        }
        .jojo-btn:hover {
            background: #e6b422;
            color: #150e18;
            transform: scale(0.97);
        }
        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .skill-tag {
            background: #1f1822;
            border-right: 4px solid #e6b422;
            padding: 4px 14px;
        }
        input, select {
            background: #1f1824;
            border: 1px solid #e6b422;
            color: #ffeaac;
            padding: 6px;
        }
        h3 {
            border-left: 6px solid #e6b422;
            padding-left: 12px;
            margin: 15px 0 10px;
        }
        @media (max-width: 700px) {
            .stats-control { gap: 10px; }
            .stat-control-item { padding: 5px 10px; min-width: 100px; }
        }
    </style>
</head>
<body>
<div class="container">
<div class="stand-card">
    <div class="jojo-tag">🌟 STAND WHEEL 🌟</div>

    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 10px;">
        <button class="jojo-btn" id="exportBtn">💾 SAVE STAND</button>
        <button class="jojo-btn" id="importBtn">📂 LOAD STAND</button>
        <button class="jojo-btn" id="resetBtn">🌀 RESET / EMPTY</button>
        <input type="file" id="fileInput" style="display:none" accept=".json">
    </div>

    <div style="display: flex; gap: 20px; flex-wrap: wrap; margin: 10px 0;">
        <div><label>🔮 USER NAME</label><br><input type="text" id="charName" placeholder="Joestar"></div>
        <div><label>⭐ STAND GRADE</label><br>
            <select id="grade">
                <option>E</option><option>D</option><option>C</option><option>B</option><option selected>A</option><option>S</option>
            </select>
        </div>
    </div>

    <!-- КОЛЕСО СТЕНДА -->
    <div class="wheel-container">
        <canvas id="standWheel" width="500" height="500" style="width:100%; height:auto; max-width:500px; aspect-ratio:1/1"></canvas>
    </div>

    <!-- Ручное управление параметрами -->
    <div class="stats-control" id="statsControlPanel"></div>

    <div class="other-panel">
        <div class="info-area">
            <h3>❤️ BATTLE STATUS</h3>
            <div class="resource">HP: <input type="number" id="hp" value="0"> / <span id="hpMax">100</span></div>
            <div class="resource">STAND ENERGY: <input type="number" id="energy" value="0"> / <span id="energyMax">100</span></div>
            <div class="kd-stand" id="kdDisplay">🌀 PARAMETER BONUS — DESTINY</div>
            <button class="jojo-btn" id="nextTurnBtn" style="width:100%">⚡ THE WORLD! NEXT TURN ⚡</button>
            <div id="turnMessage" style="text-align:center; margin-top:8px;">—— ORA ORA ——</div>
        </div>
        <div class="info-area">
            <h3>🌀 STAND ABILITIES</h3>
            <div id="skillList" class="skill-list"></div>
            <button class="jojo-btn" id="addSkillBtn">➕ ADD ABILITY</button>
        </div>
    </div>
</div>
</div>

<script>
    // Параметры стенда (как в колесе JoJo)
    const STAT_LABELS = ["POWER", "SPEED", "PRECISION", "RANGE", "DURABILITY"];
    const RANK_VALUES = {
        "?": 0, "E": 1, "D": 2, "C": 3, "B": 4, "A": 5
    };
    const RANK_LIST = ["?", "E", "D", "C", "B", "A"];

    // начальная пустая анкета (все статы = ?)
    let standStats = {
        POWER: "?",
        SPEED: "?",
        PRECISION: "?",
        RANGE: "?",
        DURABILITY: "?"
    };

    let currentData = {
        name: "",
        grade: "A",
        stats: standStats,
        hp: 0, energy: 0, hpMax: 100, energyMax: 100,
        skills: []
    };

    let canvas = document.getElementById("standWheel");
    let ctx = canvas.getContext("2d");

    // отрисовка колеса по текущим статам
    function drawWheel() {
        const w = canvas.width, h = canvas.height;
        const centerX = w/2, centerY = h/2;
        const radius = w * 0.38;
        ctx.clearRect(0, 0, w, h);
        
        const angleStep = (Math.PI * 2) / STAT_LABELS.length;
        
        // рисуем лучи и сектора
        for (let i = 0; i < STAT_LABELS.length; i++) {
            let statKey = STAT_LABELS[i];
            let rank = currentData.stats[statKey] || "?";
            let value = RANK_VALUES[rank] || 0;
            // максимальное значение = 5 (A)
            let intensity = value / 5; 
            
            // цвет сектора: от тёмно-красного до золотого в зависимости от силы
            let r = 180 + Math.floor(75 * intensity);
            let g = 80 + Math.floor(130 * intensity);
            let b = 60 + Math.floor(70 * intensity);
            let fillColor = `rgba(${r}, ${g}, ${b}, 0.85)`;
            let strokeColor = (rank === "?") ? "#aaaaaa" : "#ffcc66";
            
            let startAngle = i * angleStep - Math.PI/2;
            let endAngle = (i+1) * angleStep - Math.PI/2;
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.fillStyle = fillColor;
            ctx.fill();
            ctx.strokeStyle = "#e6b422";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // линия-разделитель
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + Math.cos(startAngle) * radius, centerY + Math.sin(startAngle) * radius);
            ctx.strokeStyle = "#e6b42266";
            ctx.stroke();
            
            // внешний текст (название стата)
            let midAngle = startAngle + angleStep/2;
            let textRadius = radius + 22;
            let xText = centerX + Math.cos(midAngle) * textRadius;
            let yText = centerY + Math.sin(midAngle) * textRadius;
            ctx.font = "bold 16px 'Oswald'";
            ctx.fillStyle = "#ffeaae";
            ctx.shadowBlur = 0;
            ctx.fillText(STAT_LABELS[i], xText-18, yText+6);
            
            // отображение ранга внутри сектора (ближе к центру)
            let innerR = radius * 0.6;
            let xRank = centerX + Math.cos(midAngle) * innerR;
            let yRank = centerY + Math.sin(midAngle) * innerR;
            ctx.font = "bold 28px 'Special Elite'";
            ctx.fillStyle = (rank === "?") ? "#bbbbcc" : "#ffd966";
            ctx.shadowBlur = 4;
            ctx.fillText(rank, xRank-12, yRank+10);
        }
        
        // рисуем центральный круг
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius*0.28, 0, 2*Math.PI);
        ctx.fillStyle = "#0a0412";
        ctx.fill();
        ctx.strokeStyle = "#e6b422";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.font = "bold 16px 'Oswald'";
        ctx.fillStyle = "#e6b422";
        ctx.fillText("STAND", centerX-32, centerY+8);
    }

    // создание панели управления статами (селекторы с возможностью "?")
    function buildStatControls() {
        const panel = document.getElementById("statsControlPanel");
        panel.innerHTML = "";
        for (let label of STAT_LABELS) {
            const currentVal = currentData.stats[label] || "?";
            const div = document.createElement("div");
            div.className = "stat-control-item";
            div.innerHTML = `
                <div class="stat-label">${label}</div>
                <select class="stat-value-select" data-stat="${label}">
                    ${RANK_LIST.map(r => `<option value="${r}" ${currentVal === r ? 'selected' : ''}>${r}</option>`).join('')}
                </select>
            `;
            panel.appendChild(div);
        }
        // привязать события изменения
        document.querySelectorAll(".stat-value-select").forEach(select => {
            select.addEventListener("change", (e) => {
                const statName = e.target.getAttribute("data-stat");
                currentData.stats[statName] = e.target.value;
                drawWheel();
                updateKD();
                // сохраняем изменения в данных
            });
        });
    }

    function updateKD() {
        const grade = currentData.grade;
        let gradeBonus = grade === "S" ? 6 : grade === "A" ? 4 : grade === "B" ? 2 : grade === "C" ? 0 : grade === "D" ? -1 : -2;
        let totalPower = 0, count = 0;
        for(let s of STAT_LABELS) {
            let val = RANK_VALUES[currentData.stats[s]] || 0;
            totalPower += val;
            if(currentData.stats[s] !== "?") count++;
        }
        let avg = (count > 0 ? (totalPower/count) : 0);
        let kd = Math.floor(avg * 2 + gradeBonus);
        document.getElementById("kdDisplay").innerHTML = `🎯 STAND DESTINY: ${kd}  |  GRADE ${grade}  |  WILLPOWER`;
    }

    function updateUIfromData() {
        document.getElementById("charName").value = currentData.name;
        document.getElementById("grade").value = currentData.grade;
        document.getElementById("hp").value = currentData.hp;
        document.getElementById("energy").value = currentData.energy;
        document.getElementById("hpMax").innerText = currentData.hpMax;
        document.getElementById("energyMax").innerText = currentData.energyMax;
        buildStatControls();
        drawWheel();
        updateKD();
        // обновить умения
        const skillContainer = document.getElementById("skillList");
        skillContainer.innerHTML = "";
        if (currentData.skills.length === 0) skillContainer.innerHTML = "<div style='color:#aa8866'>⚔️ No Abilities</div>";
        else {
            currentData.skills.forEach((sk, idx) => {
                const chip = document.createElement("div");
                chip.className = "skill-tag";
                chip.innerHTML = `${sk} <span data-skill-idx="${idx}" class="remove-skill" style="cursor:pointer;">✖</span>`;
                skillContainer.appendChild(chip);
            });
        }
    }

    // экспорт, импорт, сброс
    function exportChar() {
        currentData.name = document.getElementById("charName").value;
        currentData.grade = document.getElementById("grade").value;
        currentData.hp = parseInt(document.getElementById("hp").value) || 0;
        currentData.energy = parseInt(document.getElementById("energy").value) || 0;
        const dataStr = JSON.stringify(currentData, null, 2);
        const blob = new Blob([dataStr], {type:"application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `jojo_${currentData.name || "stand"}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }
    function importFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const loaded = JSON.parse(e.target.result);
                currentData = { ...currentData, ...loaded, stats: { ...currentData.stats, ...loaded.stats } };
                if (!currentData.skills) currentData.skills = [];
                updateUIfromData();
                document.getElementById("turnMessage").innerHTML = "✅ STAND WHEEL LOADED!";
            } catch(err) { alert("Invalid Stand File"); }
        };
        reader.readAsText(file);
    }
    function resetToEmpty() {
        const emptyStats = {};
        STAT_LABELS.forEach(l => emptyStats[l] = "?");
        currentData = {
            name: "", grade: "A", stats: emptyStats, hp: 0, energy: 0, hpMax: 100, energyMax: 100, skills: []
        };
        updateUIfromData();
        document.getElementById("turnMessage").innerHTML = "🌀 NEW STAND — ALL PARAMETERS ?";
    }
    function addSkill() {
        let ab = prompt("ABILITY NAME:", "Star Finger");
        if(ab?.trim()) currentData.skills.push(ab.trim());
        updateUIfromData();
    }
    function nextTurn() {
        document.getElementById("turnMessage").innerHTML = "⚡ ZA WARUDO! TOKI WO TOMARE! ⚡";
    }
    function removeSkillHandler(e) {
        if(e.target.classList.contains("remove-skill")) {
            const idx = parseInt(e.target.getAttribute("data-skill-idx"));
            if(!isNaN(idx)) currentData.skills.splice(idx,1);
            updateUIfromData();
        }
    }

    // обработчики
    document.getElementById("exportBtn").addEventListener("click", exportChar);
    document.getElementById("importBtn").addEventListener("click", ()=>document.getElementById("fileInput").click());
    document.getElementById("resetBtn").addEventListener("click", resetToEmpty);
    document.getElementById("nextTurnBtn").addEventListener("click", nextTurn);
    document.getElementById("addSkillBtn").addEventListener("click", addSkill);
    document.getElementById("fileInput").addEventListener("change", (e)=>{
        if(e.target.files[0]) importFromFile(e.target.files[0]);
        e.target.value="";
    });
    document.getElementById("skillList").addEventListener("click", removeSkillHandler);
    document.getElementById("charName").addEventListener("input", (e)=>currentData.name=e.target.value);
    document.getElementById("grade").addEventListener("change", (e)=>{ currentData.grade=e.target.value; updateKD(); });
    document.getElementById("hp").addEventListener("input", (e)=>currentData.hp=parseInt(e.target.value)||0);
    document.getElementById("energy").addEventListener("input", (e)=>currentData.energy=parseInt(e.target.value)||0);

    resetToEmpty(); // инициализация
</script>
</body>
</html>
