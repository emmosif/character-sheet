<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JOJO — STAND WHEEL | Анкета стенда</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Special+Elite&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0f0a0c, #050305);
            font-family: 'Oswald', sans-serif;
            padding: 30px 20px;
            color: #e6d5b8;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .stand-card {
            background: linear-gradient(145deg, #18121e, #0c0810);
            border: 3px double #e6b422;
            padding: 30px;
            box-shadow: 20px 20px 0 #5a1e1e, 0 0 0 4px #ffda77, inset 0 0 30px rgba(230,180,34,0.15);
            position: relative;
        }

        .jojo-tag {
            font-family: 'Special Elite', monospace;
            background: #e6b422;
            color: #110a10;
            display: inline-block;
            padding: 5px 28px;
            position: absolute;
            top: -18px;
            left: 40px;
            font-weight: bold;
            letter-spacing: 3px;
            box-shadow: 6px 6px 0 #4a1818;
        }

        .wheel-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            position: relative;
        }
        
        canvas {
            background: #0a0610;
            border-radius: 50%;
            box-shadow: 0 0 0 6px #e6b42244, 0 0 0 12px #2c1420, 0 10px 35px black;
            width: 100%;
            height: auto;
            max-width: 600px;
            aspect-ratio: 1/1;
            cursor: pointer;
        }

        .stats-control {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 25px 0 20px;
        }
        
        .stat-control-item {
            background: #140e16;
            border-left: 6px solid #e6b422;
            padding: 10px 18px;
            min-width: 110px;
            text-align: center;
        }
        
        .stat-label {
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1rem;
            text-transform: uppercase;
            color: #ffdd99;
        }
        
        .stat-value-select {
            background: #241e28;
            color: #ffcd7e;
            border: 1px solid #e6b422;
            padding: 6px 12px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
            font-family: monospace;
            text-align: center;
            width: 70px;
        }

        .other-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 30px;
        }
        
        .info-area {
            flex: 1;
            background: #0c0812cc;
            padding: 18px;
            backdrop-filter: blur(4px);
        }
        
        .resource {
            margin: 12px 0;
        }
        
        .resource input {
            background: #1f1722;
            border: none;
            border-bottom: 2px solid #e6b422;
            width: 80px;
            font-size: 1.2rem;
            color: #ffdfaa;
            font-weight: bold;
        }
        
        .kd-stand {
            background: #00000077;
            padding: 12px;
            border-left: 5px solid #e6b422;
            font-family: monospace;
            margin: 15px 0;
        }
        
        .jojo-btn {
            background: #2e1e26;
            border: 1px solid #e6b422;
            color: #ffeaac;
            padding: 8px 18px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.15s;
            margin: 5px 5px 0 0;
        }
        
        .jojo-btn:hover {
            background: #e6b422;
            color: #150e18;
            transform: scale(0.97);
        }
        
        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        
        .skill-tag {
            background: #1f1822;
            border-right: 4px solid #e6b422;
            padding: 4px 14px;
        }
        
        input, select {
            background: #1f1824;
            border: 1px solid #e6b422;
            color: #ffeaac;
            padding: 6px;
        }
        
        h3 {
            border-left: 6px solid #e6b422;
            padding-left: 12px;
            margin: 15px 0 10px;
        }
    </style>
</head>
<body>
<div class="container">
<div class="stand-card">
    <div class="jojo-tag">🌟 STAND WHEEL 🌟</div>

    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 10px;">
        <button class="jojo-btn" id="exportBtn">💾 SAVE STAND</button>
        <button class="jojo-btn" id="importBtn">📂 LOAD STAND</button>
        <button class="jojo-btn" id="resetBtn">🌀 RESET / EMPTY</button>
        <input type="file" id="fileInput" style="display:none" accept=".json">
    </div>

    <div style="display: flex; gap: 20px; flex-wrap: wrap; margin: 10px 0;">
        <div><label>🔮 USER NAME</label><br><input type="text" id="charName" placeholder="Joestar"></div>
        <div><label>⭐ STAND GRADE</label><br>
            <select id="grade">
                <option>E</option><option>D</option><option>C</option><option>B</option><option selected>A</option><option>S</option>
            </select>
        </div>
    </div>

    <!-- КОЛЕСО СТЕНДА (Дартс + паутина) -->
    <div class="wheel-container">
        <canvas id="standWheel" width="600" height="600"></canvas>
    </div>

    <!-- Панель управления параметрами -->
    <div class="stats-control" id="statsControlPanel"></div>

    <div class="other-panel">
        <div class="info-area">
            <h3>❤️ BATTLE STATUS</h3>
            <div class="resource">HP: <input type="number" id="hp" value="0"> / <span id="hpMax">100</span></div>
            <div class="resource">STAND ENERGY: <input type="number" id="energy" value="0"> / <span id="energyMax">100</span></div>
            <div class="kd-stand" id="kdDisplay">🌀 PARAMETER BONUS — DESTINY</div>
            <button class="jojo-btn" id="nextTurnBtn" style="width:100%">⚡ THE WORLD! NEXT TURN ⚡</button>
            <div id="turnMessage" style="text-align:center; margin-top:8px;">—— ORA ORA ——</div>
        </div>
        <div class="info-area">
            <h3>🌀 STAND ABILITIES</h3>
            <div id="skillList" class="skill-list"></div>
            <button class="jojo-btn" id="addSkillBtn">➕ ADD ABILITY</button>
        </div>
    </div>
</div>
</div>

<script>
    // === НАСТРОЙКИ КОЛЕСА ===
    const STAT_LABELS = ["POWER", "SPEED", "PRECISION", "RANGE", "DURABILITY", "POTENTIAL"];
    // Ранги: ? (0), E(1), D(2), C(3), B(4), A(5), S(6)
    const RANK_VALUES = {
        "?": 0, "E": 1, "D": 2, "C": 3, "B": 4, "A": 5, "S": 6
    };
    const RANK_LIST = ["?", "E", "D", "C", "B", "A", "S"];
    
    // Максимальный уровень (для масштабирования)
    const MAX_RANK = 6; // S
    
    let currentData = {
        name: "",
        grade: "A",
        stats: {
            POWER: "?",
            SPEED: "?",
            PRECISION: "?",
            RANGE: "?",
            DURABILITY: "?",
            POTENTIAL: "?"
        },
        hp: 0,
        energy: 0,
        hpMax: 100,
        energyMax: 100,
        skills: []
    };

    const canvas = document.getElementById("standWheel");
    let ctx = canvas.getContext("2d");
    
    // Функция отрисовки колеса (как в дартс + паутина)
    function drawWheel() {
        if (!ctx) return;
        
        const w = canvas.width;
        const h = canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;
        const outerRadius = w * 0.42;      // внешняя окружность
        const innerRadius = w * 0.12;       // внутренняя окружность (центр)
        const angleStep = (Math.PI * 2) / STAT_LABELS.length;
        
        ctx.clearRect(0, 0, w, h);
        
        // === 1. Рисуем внешнюю окружность (дартс) ===
        ctx.beginPath();
        ctx.arc(centerX, centerY, outerRadius, 0, 2 * Math.PI);
        ctx.strokeStyle = "#e6b422";
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // === 2. Рисуем внутреннюю окружность ===
        ctx.beginPath();
        ctx.arc(centerX, centerY, innerRadius, 0, 2 * Math.PI);
        ctx.strokeStyle = "#e6b42288";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // === 3. Рисуем линии от центра к краю и чёрточки ===
        for (let i = 0; i < STAT_LABELS.length; i++) {
            const angle = i * angleStep - Math.PI / 2; // чтобы первый был вверху
            const endX = centerX + Math.cos(angle) * outerRadius;
            const endY = centerY + Math.sin(angle) * outerRadius;
            
            // Линия от центра до внешней окружности
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = "#e6b42266";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            // Рисуем 6 чёрточек (для уровней E, D, C, B, A, S)
            for (let level = 1; level <= 6; level++) {
                const t = level / 6; // от центра (0) до края (1)
                const radius = innerRadius + (outerRadius - innerRadius) * t;
                const lineX = centerX + Math.cos(angle) * radius;
                const lineY = centerY + Math.sin(angle) * radius;
                
                // Перпендикулярная чёрточка
                const perpAngle = angle + Math.PI / 2;
                const tickLength = 6;
                const tickX1 = lineX + Math.cos(perpAngle) * tickLength;
                const tickY1 = lineY + Math.sin(perpAngle) * tickLength;
                const tickX2 = lineX - Math.cos(perpAngle) * tickLength;
                const tickY2 = lineY - Math.sin(perpAngle) * tickLength;
                
                ctx.beginPath();
                ctx.moveTo(tickX1, tickY1);
                ctx.lineTo(tickX2, tickY2);
                ctx.strokeStyle = "#ffdd99";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            
            // === Название стата снаружи ===
            const labelRadius = outerRadius + 18;
            const labelX = centerX + Math.cos(angle) * labelRadius;
            const labelY = centerY + Math.sin(angle) * labelRadius;
            ctx.font = "bold 12px 'Oswald'";
            ctx.fillStyle = "#ffeaae";
            ctx.fillText(STAT_LABELS[i], labelX - 20, labelY + 5);
            
            // === Буква уровня стата (крупная) под названием ===
            const rank = currentData.stats[STAT_LABELS[i]] || "?";
            const letterRadius = outerRadius + 38;
            const letterX = centerX + Math.cos(angle) * letterRadius;
            const letterY = centerY + Math.sin(angle) * letterRadius;
            ctx.font = "bold 20px 'Special Elite'";
            ctx.fillStyle = (rank === "?") ? "#bbbbcc" : "#ffd966";
            ctx.fillText(rank, letterX - 12, letterY + 8);
        }
        
        // === 4. РИСУЕМ УЗОР (паутину) по выбранным статам ===
        const points = [];
        for (let i = 0; i < STAT_LABELS.length; i++) {
            const rank = currentData.stats[STAT_LABELS[i]] || "?";
            let value = RANK_VALUES[rank];
            if (value === undefined) value = 0;
            
            // Расстояние от центра: 0 = центр, 1 = край внешней окружности
            let t;
            if (value === 0) {
                t = 0; // "?" — остаётся в центре
            } else {
                t = (value / MAX_RANK); // E=1/6, D=2/6... S=6/6
            }
            
            const radius = innerRadius + (outerRadius - innerRadius) * t;
            const angle = i * angleStep - Math.PI / 2;
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius;
            points.push({x, y});
        }
        
        // Рисуем замкнутую линию (узор)
        if (points.length > 0) {
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.closePath();
            ctx.fillStyle = "#e6b42255";
            ctx.fill();
            ctx.strokeStyle = "#ffcc66";
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Рисуем точки на узлах
            for (let p of points) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = "#ffaa33";
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // === 5. Центральный круг с логотипом ===
        ctx.beginPath();
        ctx.arc(centerX, centerY, innerRadius - 5, 0, 2 * Math.PI);
        ctx.fillStyle = "#0a0412";
        ctx.fill();
        ctx.strokeStyle = "#e6b422";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.font = "bold 12px 'Oswald'";
        ctx.fillStyle = "#e6b422";
        ctx.fillText("STAND", centerX - 24, centerY + 5);
    }

    // Создание панели управления
    function buildStatControls() {
        const panel = document.getElementById("statsControlPanel");
        if (!panel) return;
        
        panel.innerHTML = "";
        for (const label of STAT_LABELS) {
            const currentVal = currentData.stats[label] || "?";
            const div = document.createElement("div");
            div.className = "stat-control-item";
            div.innerHTML = `
                <div class="stat-label">${label}</div>
                <select class="stat-value-select" data-stat="${label}">
                    ${RANK_LIST.map(r => `<option value="${r}" ${currentVal === r ? 'selected' : ''}>${r}</option>`).join('')}
                </select>
            `;
            panel.appendChild(div);
        }
        
        // Обработчики изменения
        document.querySelectorAll(".stat-value-select").forEach(select => {
            select.addEventListener("change", (e) => {
                const statName = e.target.getAttribute("data-stat");
                currentData.stats[statName] = e.target.value;
                drawWheel();
                updateKD();
            });
        });
    }

    function updateKD() {
        const grade = currentData.grade;
        let gradeBonus = grade === "S" ? 6 : grade === "A" ? 4 : grade === "B" ? 2 : grade === "C" ? 0 : grade === "D" ? -1 : -2;
        let totalPower = 0;
        let count = 0;
        
        for (const s of STAT_LABELS) {
            const val = RANK_VALUES[currentData.stats[s]] || 0;
            totalPower += val;
            if (currentData.stats[s] !== "?") count++;
        }
        
        const avg = count > 0 ? totalPower / count : 0;
        const kd = Math.floor(avg * 2 + gradeBonus);
        const kdDisplay = document.getElementById("kdDisplay");
        if (kdDisplay) {
            kdDisplay.innerHTML = `🎯 STAND DESTINY: ${kd}  |  GRADE ${grade}  |  WILLPOWER`;
        }
    }

    function updateUIfromData() {
        const charName = document.getElementById("charName");
        const grade = document.getElementById("grade");
        const hp = document.getElementById("hp");
        const energy = document.getElementById("energy");
        const hpMax = document.getElementById("hpMax");
        const energyMax = document.getElementById("energyMax");
        
        if (charName) charName.value = currentData.name;
        if (grade) grade.value = currentData.grade;
        if (hp) hp.value = currentData.hp;
        if (energy) energy.value = currentData.energy;
        if (hpMax) hpMax.innerText = currentData.hpMax;
        if (energyMax) energyMax.innerText = currentData.energyMax;
        
        buildStatControls();
        drawWheel();
        updateKD();
        
        const skillContainer = document.getElementById("skillList");
        if (skillContainer) {
            skillContainer.innerHTML = "";
            if (currentData.skills.length === 0) {
                skillContainer.innerHTML = "<div style='color:#aa8866'>⚔️ No Abilities</div>";
            } else {
                currentData.skills.forEach((sk, idx) => {
                    const chip = document.createElement("div");
                    chip.className = "skill-tag";
                    chip.innerHTML = `${sk} <span data-skill-idx="${idx}" class="remove-skill" style="cursor:pointer;">✖</span>`;
                    skillContainer.appendChild(chip);
                });
            }
        }
    }

    function exportChar() {
        currentData.name = document.getElementById("charName").value;
        currentData.grade = document.getElementById("grade").value;
        currentData.hp = parseInt(document.getElementById("hp").value) || 0;
        currentData.energy = parseInt(document.getElementById("energy").value) || 0;
        
        const dataStr = JSON.stringify(currentData, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `jojo_${currentData.name || "stand"}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }
    
    function importFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const loaded = JSON.parse(e.target.result);
                currentData = { ...currentData, ...loaded, stats: { ...currentData.stats, ...loaded.stats } };
                if (!currentData.skills) currentData.skills = [];
                updateUIfromData();
                const turnMsg = document.getElementById("turnMessage");
                if (turnMsg) turnMsg.innerHTML = "✅ STAND WHEEL LOADED!";
            } catch(err) {
                alert("Invalid Stand File");
            }
        };
        reader.readAsText(file);
    }
    
    function resetToEmpty() {
        const emptyStats = {};
        STAT_LABELS.forEach(l => emptyStats[l] = "?");
        currentData = {
            name: "",
            grade: "A",
            stats: emptyStats,
            hp: 0,
            energy: 0,
            hpMax: 100,
            energyMax: 100,
            skills: []
        };
        updateUIfromData();
        const turnMsg = document.getElementById("turnMessage");
        if (turnMsg) turnMsg.innerHTML = "🌀 NEW STAND — ALL PARAMETERS ?";
    }
    
    function addSkill() {
        const ab = prompt("ABILITY NAME:", "Star Finger");
        if (ab && ab.trim()) {
            currentData.skills.push(ab.trim());
            updateUIfromData();
        }
    }
    
    function nextTurn() {
        const turnMsg = document.getElementById("turnMessage");
        if (turnMsg) turnMsg.innerHTML = "⚡ ZA WARUDO! TOKI WO TOMARE! ⚡";
    }
    
    function removeSkillHandler(e) {
        if (e.target.classList.contains("remove-skill")) {
            const idx = parseInt(e.target.getAttribute("data-skill-idx"));
            if (!isNaN(idx)) {
                currentData.skills.splice(idx, 1);
                updateUIfromData();
            }
        }
    }

    // Инициализация
    window.addEventListener('DOMContentLoaded', () => {
        const exportBtn = document.getElementById("exportBtn");
        const importBtn = document.getElementById("importBtn");
        const resetBtn = document.getElementById("resetBtn");
        const nextTurnBtn = document.getElementById("nextTurnBtn");
        const addSkillBtn = document.getElementById("addSkillBtn");
        const fileInput = document.getElementById("fileInput");
        const skillList = document.getElementById("skillList");
        const charName = document.getElementById("charName");
        const grade = document.getElementById("grade");
        const hp = document.getElementById("hp");
        const energy = document.getElementById("energy");
        
        if (exportBtn) exportBtn.addEventListener("click", exportChar);
        if (importBtn) importBtn.addEventListener("click", () => fileInput.click());
        if (resetBtn) resetBtn.addEventListener("click", resetToEmpty);
        if (nextTurnBtn) nextTurnBtn.addEventListener("click", nextTurn);
        if (addSkillBtn) addSkillBtn.addEventListener("click", addSkill);
        if (fileInput) {
            fileInput.addEventListener("change", (e) => {
                if (e.target.files[0]) importFromFile(e.target.files[0]);
                e.target.value = "";
            });
        }
        if (skillList) skillList.addEventListener("click", removeSkillHandler);
        if (charName) charName.addEventListener("input", (e) => currentData.name = e.target.value);
        if (grade) grade.addEventListener("change", (e) => { currentData.grade = e.target.value; updateKD(); });
        if (hp) hp.addEventListener("input", (e) => currentData.hp = parseInt(e.target.value) || 0);
        if (energy) energy.addEventListener("input", (e) => currentData.energy = parseInt(e.target.value) || 0);
        
        resetToEmpty();
    });
</script>
</body>
</html>
