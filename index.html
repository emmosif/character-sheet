<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анкета персонажа — настольная игра</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #0f0f14;
            margin: 0;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1a1a24;
            border-radius: 32px;
            padding: 24px 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2c2c3a;
        }

        /* заголовок и экспорт/импорт */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .file-zone {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button, .file-label {
            background: #2c2c3e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #d9d9e3;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            border: 1px solid #3d3d52;
        }

        button:hover, .file-label:hover {
            background: #3d3d5c;
            transform: scale(0.97);
            border-color: #6d6d8a;
        }

        .reset-btn {
            background: #2a1f2f;
            border-color: #7a3e6e;
            color: #f0a0e0;
        }

        /* основная сетка */
        .two-columns {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .left-panel {
            flex: 1.4;
            min-width: 240px;
        }

        .right-panel {
            flex: 1;
            min-width: 240px;
        }

        /* карточка */
        .card {
            background: #12121c;
            border-radius: 24px;
            padding: 18px 20px;
            margin-bottom: 24px;
            border: 1px solid #2a2a36;
        }

        .card h3 {
            margin: 0 0 16px 0;
            font-size: 1.3rem;
            color: #c0c0e6;
            border-left: 4px solid #b886ff;
            padding-left: 12px;
        }

        /* поле ввода имени и грейд */
        .row-flex {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .field {
            flex: 1;
        }

        .field label {
            display: block;
            font-size: 12px;
            color: #8a8ab0;
            margin-bottom: 6px;
        }

        .field input, .field select {
            width: 100%;
            background: #0a0a12;
            border: 1px solid #33334a;
            padding: 10px 12px;
            border-radius: 20px;
            color: white;
            font-size: 1rem;
        }

        /* статы с кнопками +- */
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0e0e16;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 28px;
        }

        .stat-name {
            font-weight: 600;
            width: 110px;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.2rem;
            width: 35px;
            text-align: center;
        }

        .stat-buttons button {
            padding: 4px 14px;
            font-size: 1.2rem;
            margin: 0 4px;
            background: #232338;
        }

        /* здоровье и энергия */
        .resource {
            margin-bottom: 18px;
        }

        .resource label {
            display: inline-block;
            width: 90px;
            font-weight: bold;
        }

        .resource input {
            background: #0a0a12;
            border: 1px solid #3a3a50;
            padding: 8px 12px;
            border-radius: 20px;
            width: 100px;
            color: white;
            text-align: center;
        }

        .kd-line {
            background: #0b0b12;
            padding: 12px;
            border-radius: 20px;
            margin: 16px 0;
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
            border-left: 3px solid gold;
        }

        .next-turn {
            background: #2c1e2a;
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 8px;
            color: #ffcc88;
            border-color: #aa6f3c;
        }

        .skills {
            margin-top: 20px;
        }

        .skill-list {
            margin: 10px 0;
            min-height: 100px;
        }

        .skill-tag {
            background: #25253a;
            display: inline-block;
            margin: 4px 6px 4px 0;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        hr {
            border-color: #2a2a36;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <h2>📜 АНКЕТА ПЕРСОНАЖА</h2>
        <div class="file-zone">
            <button id="exportBtn">📤 Экспорт</button>
            <button id="importBtn">📂 Импорт</button>
            <button id="resetBtn" class="reset-btn">🗑️ Очистить / Новая анкета</button>
            <input type="file" id="fileInput" accept=".json" style="display:none">
        </div>
    </div>

    <div class="two-columns">
        <!-- ЛЕВАЯ КОЛОНКА -->
        <div class="left-panel">
            <div class="card">
                <h3>📇 Основное</h3>
                <div class="row-flex">
                    <div class="field">
                        <label>Имя персонажа</label>
                        <input type="text" id="charName" placeholder="Не указано">
                    </div>
                    <div class="field">
                        <label>Грейд</label>
                        <select id="grade">
                            <option value="4">4 (низший)</option>
                            <option value="3">3</option>
                            <option value="2">2</option>
                            <option value="1" selected>1 (высший)</option>
                            <option value="S">S</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>⚔️ Характеристики</h3>
                <div id="statsContainer">
                    <!-- динам. создание через js -->
                </div>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА -->
        <div class="right-panel">
            <div class="card">
                <h3>❤️ Текущее состояние</h3>
                <div class="resource">
                    <label>Здоровье:</label>
                    <input type="number" id="hp" value="0"> / <span id="hpMax">100</span>
                </div>
                <div class="resource">
                    <label>Энергия:</label>
                    <input type="number" id="energy" value="0"> / <span id="energyMax">100</span>
                </div>
                <div class="kd-line" id="kdDisplay">
                    🛡️ КД (Сила): 0 &nbsp;|&nbsp; КД (Телосложение): 0 &nbsp;|&nbsp; КД (Управление): 0
                </div>
                <button class="next-turn" id="nextTurnBtn">⚡ СЛЕДУЮЩИЙ ХОД | ЧЕРНАЯ МОЛНИЯ!!!</button>
                <div id="turnMessage" style="margin-top: 12px; font-size: 0.85rem; text-align:center; color:#bb9eff;"></div>
            </div>

            <div class="card">
                <h3>🌀 Умения</h3>
                <div class="skills">
                    <div id="skillList" class="skill-list"></div>
                    <button id="addSkillBtn" style="width:100%; margin-top:6px;">+ Новое умение</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ----------------------------------------------
    // ДАННЫЕ ПО УМОЛЧАНИЮ (ПУСТАЯ АНКЕТА)
    // ----------------------------------------------
    const defaultData = {
        name: "",
        grade: "1",
        stats: {
            сила: 0,
            управление: 0,
            телосложение: 0,
            память: 0,
            интеллект: 0,
            восприятие: 0
        },
        hp: 0,
        energy: 0,
        hpMax: 100,
        energyMax: 100,
        skills: []
    };

    // текущее состояние
    let currentData = JSON.parse(JSON.stringify(defaultData));

    // список характеристик для отображения
    const statKeys = ["сила", "управление", "телосложение", "память", "интеллект", "восприятие"];

    // ========== ОТРИСОВКА ИНТЕРФЕЙСА ==========
    function renderAll() {
        // основные поля
        document.getElementById("charName").value = currentData.name;
        document.getElementById("grade").value = currentData.grade;
        document.getElementById("hp").value = currentData.hp;
        document.getElementById("energy").value = currentData.energy;
        document.getElementById("hpMax").innerText = currentData.hpMax;
        document.getElementById("energyMax").innerText = currentData.energyMax;

        // отрисовка статов с кнопками
        const container = document.getElementById("statsContainer");
        container.innerHTML = "";
        for (let key of statKeys) {
            const val = currentData.stats[key] || 0;
            const div = document.createElement("div");
            div.className = "stat-item";
            div.innerHTML = `
                <span class="stat-name">${key.charAt(0).toUpperCase() + key.slice(1)}</span>
                <span class="stat-value" id="stat_${key}">${val}</span>
                <div class="stat-buttons">
                    <button class="dec-btn" data-stat="${key}">-</button>
                    <button class="inc-btn" data-stat="${key}">+</button>
                </div>
            `;
            container.appendChild(div);
        }

        // навесить обработчики на кнопки +/-
        document.querySelectorAll(".dec-btn").forEach(btn => {
            btn.removeEventListener("click", decHandler);
            btn.addEventListener("click", decHandler);
        });
        document.querySelectorAll(".inc-btn").forEach(btn => {
            btn.removeEventListener("click", incHandler);
            btn.addEventListener("click", incHandler);
        });

        // отрисовка умений
        const skillContainer = document.getElementById("skillList");
        skillContainer.innerHTML = "";
        if (currentData.skills.length === 0) {
            skillContainer.innerHTML = '<span style="color:#6a6a88; font-size:0.8rem;">Нет умений. Нажмите "Новое умение"</span>';
        } else {
            currentData.skills.forEach((skill, idx) => {
                const chip = document.createElement("div");
                chip.className = "skill-tag";
                chip.innerHTML = `${skill} <span style="cursor:pointer; margin-left:8px; color:#ffaa88;" data-skill-idx="${idx}" class="remove-skill">✖</span>`;
                skillContainer.appendChild(chip);
            });
        }

        // пересчитать КД (простая формула: значение характеристики + грейд-бонус)
        updateKD();
        updateTurnMessage("");
    }

    function decHandler(e) {
        const statName = e.currentTarget.getAttribute("data-stat");
        let oldVal = currentData.stats[statName];
        let newVal = Math.max(0, oldVal - 1);
        currentData.stats[statName] = newVal;
        document.getElementById(`stat_${statName}`).innerText = newVal;
        updateKD();
    }

    function incHandler(e) {
        const statName = e.currentTarget.getAttribute("data-stat");
        let oldVal = currentData.stats[statName];
        let newVal = Math.min(20, oldVal + 1);
        currentData.stats[statName] = newVal;
        document.getElementById(`stat_${statName}`).innerText = newVal;
        updateKD();
    }

    function updateKD() {
        // формула КД: характеристика + модификатор грейда (для примера)
        const grade = currentData.grade;
        let gradeMod = 0;
        if (grade === "S") gradeMod = 5;
        else if (grade === "1") gradeMod = 4;
        else if (grade === "2") gradeMod = 2;
        else if (grade === "3") gradeMod = 1;
        else if (grade === "4") gradeMod = 0;
        
        const strKD = (currentData.stats["сила"] || 0) + gradeMod;
        const bodyKD = (currentData.stats["телосложение"] || 0) + gradeMod;
        const ctrlKD = (currentData.stats["управление"] || 0) + gradeMod;
        
        document.getElementById("kdDisplay").innerHTML = `🛡️ КД (Сила): ${strKD} &nbsp;|&nbsp; КД (Телосложение): ${bodyKD} &nbsp;|&nbsp; КД (Управление): ${ctrlKD}`;
    }

    function updateTurnMessage(msg) {
        const turnDiv = document.getElementById("turnMessage");
        if (msg) turnDiv.innerHTML = msg;
        else turnDiv.innerHTML = "";
    }

    // ========== ЭКСПОРТ В ФАЙЛ ==========
    function exportToFile() {
        // синхронизируем все текущие значения из полей ввода
        currentData.name = document.getElementById("charName").value;
        currentData.grade = document.getElementById("grade").value;
        currentData.hp = parseInt(document.getElementById("hp").value) || 0;
        currentData.energy = parseInt(document.getElementById("energy").value) || 0;
        // характеристики уже обновляются через +/-, но дополнительно перечитаем из DOM (на всякий случай)
        for (let key of statKeys) {
            const span = document.getElementById(`stat_${key}`);
            if (span) currentData.stats[key] = parseInt(span.innerText) || 0;
        }
        // умения в currentData.skills уже хранятся, но нужно убедиться, что рендер их не затирает, всё ок.

        const dataStr = JSON.stringify(currentData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `character_${currentData.name || "blank"}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // ========== ИМПОРТ ИЗ ФАЙЛА (загрузка в анкету) ==========
    function importFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const loaded = JSON.parse(e.target.result);
                // валидация минимальной структуры
                if (!loaded.stats || typeof loaded !== "object") throw new Error("Неверный формат");
                
                // обновляем currentData, заполняя недостающие поля значениями по умолчанию
                currentData = {
                    name: loaded.name ?? "",
                    grade: loaded.grade ?? "1",
                    stats: { ...defaultData.stats, ...loaded.stats },
                    hp: loaded.hp ?? 0,
                    energy: loaded.energy ?? 0,
                    hpMax: loaded.hpMax ?? 100,
                    energyMax: loaded.energyMax ?? 100,
                    skills: Array.isArray(loaded.skills) ? loaded.skills : []
                };
                
                // гарантия, что характеристики в рамках 0..20
                for (let key of statKeys) {
                    if (currentData.stats[key] > 20) currentData.stats[key] = 20;
                    if (currentData.stats[key] < 0) currentData.stats[key] = 0;
                }
                
                renderAll();
                updateTurnMessage("✅ Анкета загружена!");
            } catch(err) {
                alert("Ошибка при загрузке файла: " + err.message);
            }
        };
        reader.readAsText(file);
    }

    // ========== СБРОС К ПУСТОЙ АНКЕТЕ ==========
    function resetToEmpty() {
        currentData = JSON.parse(JSON.stringify(defaultData));
        renderAll();
        updateTurnMessage("✨ Новая пустая анкета создана");
    }

    // ========== ДОБАВИТЬ УМЕНИЕ ==========
    function addNewSkill() {
        let newSkill = prompt("Введите название умения:", "Теневой удар");
        if (newSkill && newSkill.trim() !== "") {
            currentData.skills.push(newSkill.trim());
            renderAll();
        }
    }

    // удаление умения
    function handleSkillRemove(e) {
        const target = e.target;
        if (target.classList && target.classList.contains("remove-skill")) {
            const idx = parseInt(target.getAttribute("data-skill-idx"));
            if (!isNaN(idx) && idx >= 0 && idx < currentData.skills.length) {
                currentData.skills.splice(idx, 1);
                renderAll();
            }
        }
    }

    // следующий ход
    function nextTurn() {
        updateTurnMessage("⚡ ЧЕРНАЯ МОЛНИЯ!!! Ход передан. Энергия не восстанавливается (механика игры)");
        // тут можно добавить логику восстановления если надо
    }

    // ========== ЖИВЫЕ ОБНОВЛЕНИЯ ПОЛЕЙ ==========
    function bindLiveEdits() {
        document.getElementById("charName").addEventListener("input", (e) => {
            currentData.name = e.target.value;
        });
        document.getElementById("grade").addEventListener("change", (e) => {
            currentData.grade = e.target.value;
            updateKD();
        });
        document.getElementById("hp").addEventListener("input", (e) => {
            currentData.hp = parseInt(e.target.value) || 0;
            updateKD();  // КД не зависит от хп, но пусть будет
        });
        document.getElementById("energy").addEventListener("input", (e) => {
            currentData.energy = parseInt(e.target.value) || 0;
        });
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        renderAll();
        bindLiveEdits();
        
        document.getElementById("exportBtn").addEventListener("click", exportToFile);
        document.getElementById("importBtn").addEventListener("click", () => {
            document.getElementById("fileInput").click();
        });
        document.getElementById("resetBtn").addEventListener("click", resetToEmpty);
        document.getElementById("nextTurnBtn").addEventListener("click", nextTurn);
        document.getElementById("addSkillBtn").addEventListener("click", addNewSkill);
        document.getElementById("fileInput").addEventListener("change", (e) => {
            if (e.target.files.length > 0) {
                importFromFile(e.target.files[0]);
                e.target.value = ""; // чтобы можно было заново тот же файл
            }
        });
        document.getElementById("skillList").addEventListener("click", handleSkillRemove);
    }
    
    init();
</script>
</body>
</html>
