<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JOJO — BIZARRE STAND | Анкета персонажа</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f0a;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 24px;
            color: #dad2be;
            min-height: 100vh;
            position: relative;
        }
        
        /* декоративные элементы */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 40%, rgba(30,60,30,0.3) 0%, rgba(10,15,8,0.95) 100%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1500px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        
        /* главная карточка — изысканный минимализм */
        .stand-card {
            background: rgba(18, 22, 16, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(220, 150, 40, 0.4);
            padding: 32px 36px;
            position: relative;
            transition: all 0.3s ease;
        }
        
        /* уголки как в дорогом издании */
        .stand-card::before,
        .stand-card::after {
            content: "";
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #d48a2b;
            border-style: solid;
            border-width: 0;
        }
        
        .stand-card::before {
            top: 16px;
            left: 16px;
            border-top-width: 2px;
            border-left-width: 2px;
        }
        
        .stand-card::after {
            bottom: 16px;
            right: 16px;
            border-bottom-width: 2px;
            border-right-width: 2px;
        }
        
        /* лента с надписью */
        .jojo-tag {
            font-family: 'Cormorant Garamond', serif;
            background: #d48a2b;
            color: #0a1f0a;
            display: inline-block;
            padding: 6px 32px;
            position: absolute;
            top: -16px;
            left: 48px;
            font-weight: 600;
            letter-spacing: 6px;
            font-size: 0.85rem;
            text-transform: uppercase;
            z-index: 5;
        }
        
        .three-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            margin-top: 28px;
        }
        
        .wheel-col {
            flex: 1.1;
            min-width: 300px;
        }
        
        .skills-col {
            flex: 1.4;
            min-width: 320px;
        }
        
        .combat-col {
            flex: 0.9;
            min-width: 260px;
        }
        
        /* колесо - элегантное */
        .wheel-container {
            display: flex;
            justify-content: center;
            margin: 10px 0 20px;
        }
        
        canvas {
            background: rgba(8, 12, 7, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(212, 138, 43, 0.5), 0 20px 35px -10px rgba(0,0,0,0.6);
            width: 100%;
            height: auto;
            max-width: 420px;
            aspect-ratio: 1/1;
            cursor: pointer;
            transition: filter 0.2s;
        }
        
        canvas:hover {
            filter: drop-shadow(0 0 8px rgba(212, 138, 43, 0.3));
        }
        
        /* тип стенда - стильный */
        .stand-type-selector {
            background: rgba(25, 32, 22, 0.6);
            padding: 14px 16px;
            margin: 16px 0;
            border-left: 3px solid #d48a2b;
            backdrop-filter: blur(4px);
        }
        
        .stand-type-selector h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #e0aa5e;
        }
        
        .stand-type-selector label {
            margin-right: 20px;
            font-size: 0.8rem;
            font-weight: 300;
            cursor: pointer;
        }
        
        .stand-type-selector input {
            margin-right: 5px;
            accent-color: #d48a2b;
        }
        
        /* контроллеры статов колеса */
        .stats-control-wheel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }
        
        .stat-control-item {
            background: rgba(20, 26, 18, 0.7);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            min-width: 80px;
            text-align: center;
            transition: all 0.2s;
        }
        
        .stat-label {
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #e0aa5e;
            font-weight: 500;
        }
        
        .stat-value-select {
            background: #1a2218;
            border: 1px solid #d48a2b;
            color: #eacc8a;
            padding: 4px 8px;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 5px;
            width: 60px;
            text-align: center;
            font-family: monospace;
            cursor: pointer;
        }
        
        /* характеристики юзера — изящно */
        .user-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        
        .user-stat {
            background: rgba(12, 16, 10, 0.6);
            backdrop-filter: blur(4px);
            padding: 8px 6px;
            text-align: center;
            border-bottom: 1px solid rgba(212, 138, 43, 0.4);
        }
        
        .user-stat-name {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #c0b28a;
            letter-spacing: 1px;
        }
        
        .user-stat-value {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 6px 0;
        }
        
        .user-stat-value input {
            width: 50px;
            text-align: center;
            background: #0f130d;
            border: 1px solid #d48a2b;
            color: #eeddbb;
            font-size: 0.9rem;
            padding: 4px;
        }
        
        .user-stat-value button {
            background: none;
            border: 1px solid #d48a2b;
            color: #d48a2b;
            width: 24px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        
        .user-stat-value button:hover {
            background: #d48a2b;
            color: #0a1a0a;
        }
        
        .user-stat-mod {
            font-size: 0.7rem;
            font-weight: 500;
            color: #e0aa5e;
        }
        
        /* навыки — списком, элегантно */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 16px 0;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 8px;
        }
        
        .skill-card {
            background: rgba(12, 17, 10, 0.5);
            backdrop-filter: blur(3px);
            padding: 8px 12px;
            border-left: 2px solid #d48a2b;
            transition: 0.2s;
        }
        
        .skill-name {
            font-weight: 500;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #cfc294;
        }
        
        .skill-value {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: #e8b75e;
            margin-top: 4px;
        }
        
        /* боевые параметры */
        .combat-stat {
            background: rgba(10, 14, 8, 0.6);
            backdrop-filter: blur(4px);
            padding: 12px 12px;
            margin: 10px 0;
            text-align: center;
            border-bottom: 1px solid rgba(212, 138, 43, 0.4);
        }
        
        .combat-stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #e8b75e;
            font-family: monospace;
            letter-spacing: 2px;
        }
        
        .resource {
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .resource input {
            background: #0f130d;
            border: none;
            border-bottom: 1px solid #d48a2b;
            width: 70px;
            font-size: 1rem;
            color: #eecd9a;
            padding: 4px;
            text-align: center;
        }
        
        .weapon-select {
            background: #0f130d;
            border: 1px solid #d48a2b;
            color: #eecd9a;
            padding: 5px;
            width: 100%;
            margin: 6px 0;
            font-size: 0.75rem;
        }
        
        .small-text {
            font-size: 0.65rem;
            color: #8f8a6e;
            margin-top: 4px;
        }
        
        /* кнопки в стиле "странное приключение" */
        .jojo-btn {
            background: none;
            border: 1px solid #d48a2b;
            color: #e0aa5e;
            padding: 6px 16px;
            font-weight: 400;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.7rem;
            text-transform: uppercase;
            backdrop-filter: blur(2px);
        }
        
        .jojo-btn:hover {
            background: #d48a2b;
            color: #0a1a0a;
            border-color: #b8732a;
        }
        
        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        
        .skill-tag {
            background: rgba(30, 38, 24, 0.7);
            border-right: 2px solid #d48a2b;
            padding: 4px 12px;
            font-size: 0.7rem;
            backdrop-filter: blur(2px);
        }
        
        h3 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 1.2rem;
            color: #e0aa5e;
            margin: 18px 0 12px 0;
            border-left: 3px solid #d48a2b;
            padding-left: 12px;
        }
        
        h4 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 0.9rem;
            color: #cfb87a;
            margin: 10px 0 6px;
            letter-spacing: 1px;
        }
        
        input, select {
            background: rgba(10, 14, 8, 0.8);
            border: 1px solid #5a6e3a;
            color: #eadbad;
            font-family: monospace;
        }
        
        label {
            font-size: 0.75rem;
        }
        
        /* скролл для навыков */
        .skills-grid::-webkit-scrollbar {
            width: 4px;
        }
        
        .skills-grid::-webkit-scrollbar-track {
            background: #1a2218;
        }
        
        .skills-grid::-webkit-scrollbar-thumb {
            background: #d48a2b;
        }
        
        @media (max-width: 900px) {
            .stand-card { padding: 24px; }
        }
    </style>
</head>
<body>
<div class="container">
<div class="stand-card">
    <div class="jojo-tag">✦ BIZARRE STAND ✦</div>

    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 20px;">
        <button class="jojo-btn" id="exportBtn">⟡ SAVE ⟡</button>
        <button class="jojo-btn" id="importBtn">⟡ LOAD ⟡</button>
        <button class="jojo-btn" id="resetBtn">⟡ RESET ⟡</button>
        <input type="file" id="fileInput" style="display:none" accept=".json">
    </div>

    <div style="display: flex; gap: 20px; margin-bottom: 10px;">
        <div><label>✦ USER</label><br><input type="text" id="charName" placeholder="Joestar" style="width:180px; font-family:monospace;"></div>
    </div>

    <div class="three-columns">
        <!-- КОЛОНКА 1: КОЛЕСО СТЕНДА -->
        <div class="wheel-col">
            <div class="wheel-container">
                <canvas id="standWheel" width="440" height="440"></canvas>
            </div>
            <div class="stand-type-selector">
                <h4>⌘ STAND TYPE</h4>
                <label><input type="radio" name="standType" value="close"> Ближняя дистанция</label>
                <label><input type="radio" name="standType" value="long"> Дальняя дистанция</label>
                <label><input type="radio" name="standType" value="auto"> Автоматический</label>
                <label><input type="radio" name="standType" value="radius"> Радиус неуместен</label>
            </div>
            <div class="stats-control-wheel" id="statsControlPanel"></div>
        </div>
        
        <!-- КОЛОНКА 2: ХАРАКТЕРИСТИКИ + НАВЫКИ -->
        <div class="skills-col">
            <h3>✦ USER STATS</h3>
            <div class="user-stats-grid" id="userStatsPanel"></div>
            <h3>✦ STAND ABILITIES</h3>
            <div class="skills-grid" id="skillsPanel"></div>
        </div>
        
        <!-- КОЛОНКА 3: БОЙ -->
        <div class="combat-col">
            <h3>✦ COMBAT</h3>
            <div class="resource"><span>❤️ HP</span> <input type="number" id="hp" value="0"> / <span id="hpMax">0</span></div>
            <div class="resource"><span>✦ STAND ENERGY</span> <input type="number" id="energy" value="0"> / <span id="energyMax">100</span></div>
            
            <div class="combat-stat"><div>🛡️  DEFENSE (KD)</div><div class="combat-stat-value" id="kdValue">0</div></div>
            <div class="combat-stat"><div>⚡ REACTION</div><div class="combat-stat-value" id="reactionValue">0</div></div>
            <div class="combat-stat"><div>🧠 WILL</div><div class="combat-stat-value" id="willValue">0</div></div>
            
            <h4>⌘ MELEE</h4>
            <select id="meleeType" class="weapon-select">
                <option value="strength">Силовое оружие (Strength)</option>
                <option value="agility">Лёгкое оружие (Agility)</option>
            </select>
            <div class="combat-stat"><div>⚔️ MELEE</div><div class="combat-stat-value" id="meleeValue">0</div><div class="small-text">+ proficiency bonus (+2)</div></div>
            
            <h4>⌘ RANGED</h4>
            <div class="combat-stat"><div>🏹 RANGED</div><div class="combat-stat-value" id="rangedValue">0</div><div class="small-text">+ proficiency (if weapon)</div></div>
            <label style="font-size:0.7rem"><input type="checkbox" id="rangedProf"> 🎯 владение оружием (+2)</label>
            
            <div class="combat-stat"><div>🌀 STAND MOD</div><div class="combat-stat-value" id="standMod">0</div></div>
            
            <h3>✦ SPECIAL MOVES</h3>
            <div id="skillList" class="skill-list"></div>
            <button class="jojo-btn" id="addSkillBtn" style="width:100%">+ ADD MOVE</button>
            <button class="jojo-btn" id="nextTurnBtn" style="width:100%; margin-top:18px;">◈ NEXT TURN ◈</button>
            <div id="turnMessage" style="text-align:center; margin-top:12px; font-size:0.7rem; font-style:italic; color:#af9a6a;">—— bizarre ——</div>
        </div>
    </div>
</div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const STAT_LABELS = ["POWER", "SPEED", "PRECISION", "RANGE", "DURABILITY", "POTENTIAL"];
    const RANK_VALUES = { "?":0, "E":1, "D":2, "C":3, "B":4, "A":5, "S":6 };
    const RANK_LIST = ["?","E","D","C","B","A","S"];
    const MAX_RANK = 6;
    
    const USER_STATS = ["Сила","Управление","Телосложение","Память","Мышление","Восприятие","Харизма","Манипуляция","Притворство"];
    
    let currentData = {
        name: "", standName: "", standType: "close",
        wheelStats: { POWER:"?", SPEED:"?", PRECISION:"?", RANGE:"?", DURABILITY:"?", POTENTIAL:"?" },
        userStats: { "Сила":10,"Управление":10,"Телосложение":10,"Память":10,"Мышление":10,"Восприятие":10,"Харизма":10,"Манипуляция":10,"Притворство":10 },
        hp:0, energy:0, hpMax:0, energyMax:100, skills: []
    };
    
    function getMod(v) { return Math.floor((v-10)/2); }
    
    function calculateSkills() {
        let u = currentData.userStats;
        let m = (s) => getMod(u[s]);
        return {
            "Атлетика": m("Управление")+m("Сила"),
            "Координация": m("Управление"),
            "Точность": m("Восприятие"),
            "Крепость Тела": m("Телосложение")+m("Сила"),
            "Иммунитет": m("Телосложение")+m("Сила"),
            "Логическое мышление": m("Память")+m("Мышление"),
            "Образное мышление": m("Память")+m("Восприятие"),
            "Внимательность": m("Восприятие"),
            "Проницательность": m("Харизма"),
            "Обаяние": m("Харизма"),
            "Принуждение": m("Манипуляция"),
            "Запугивание": Math.max(m("Манипуляция"), m("Сила")),
            "Убеждение": Math.max(m("Харизма"), m("Манипуляция")),
            "Обман": m("Притворство"),
            "Изображение": m("Притворство")
        };
    }
    
    function calculateCombat() {
        let u = currentData.userStats;
        let skills = calculateSkills();
        let hpMod = getMod(u["Телосложение"]);
        let крепость = skills["Крепость Тела"];
        let maxHp = hpMod*10 + крепость;
        let kd = 10 + getMod(u["Сила"]) + getMod(u["Управление"]) + getMod(u["Телосложение"]);
        let reaction = getMod(u["Управление"]) + skills["Точность"];
        let will = getMod(u["Мышление"]) + getMod(u["Память"]);
        let meleeType = document.getElementById("meleeType")?.value || "strength";
        let meleeStat = meleeType==="strength" ? getMod(u["Сила"]) : getMod(u["Управление"]);
        let melee = meleeStat + getMod(u["Телосложение"]) + 2;
        let rangedProf = document.getElementById("rangedProf")?.checked ? 2 : 0;
        let ranged = skills["Точность"] + getMod(u["Восприятие"]) + rangedProf;
        let totalRank=0, cnt=0;
        for(let s of STAT_LABELS){ let v = RANK_VALUES[currentData.wheelStats[s]]||0; if(v>0){ totalRank+=v; cnt++; } }
        let standMod = cnt>0 ? Math.floor(totalRank/cnt)-3 : 0;
        return { maxHp, kd, reaction, will, melee, ranged, standMod };
    }
    
    function updateUI() {
        drawWheel();
        let skills = calculateSkills();
        let panel = document.getElementById("skillsPanel");
        if(panel){
            panel.innerHTML="";
            for(let [name,val] of Object.entries(skills)){
                let div = document.createElement("div"); div.className="skill-card";
                div.innerHTML = `<div class="skill-name">${name}</div><div class="skill-value">${val>=0?`+${val}`:val}</div>`;
                panel.appendChild(div);
            }
        }
        let cbt = calculateCombat();
        document.getElementById("kdValue").innerText = cbt.kd;
        document.getElementById("reactionValue").innerText = cbt.reaction>=0?`+${cbt.reaction}`:cbt.reaction;
        document.getElementById("willValue").innerText = cbt.will>=0?`+${cbt.will}`:cbt.will;
        document.getElementById("meleeValue").innerText = cbt.melee>=0?`+${cbt.melee}`:cbt.melee;
        document.getElementById("rangedValue").innerText = cbt.ranged>=0?`+${cbt.ranged}`:cbt.ranged;
        document.getElementById("standMod").innerText = cbt.standMod>=0?`+${cbt.standMod}`:cbt.standMod;
        if(currentData.hpMax !== cbt.maxHp){
            currentData.hpMax = cbt.maxHp;
            if(currentData.hp > currentData.hpMax) currentData.hp = currentData.hpMax;
            document.getElementById("hpMax").innerText = currentData.hpMax;
            document.getElementById("hp").value = currentData.hp;
        }
        let skillListDiv = document.getElementById("skillList");
        if(skillListDiv){
            skillListDiv.innerHTML = "";
            if(currentData.skills.length===0) skillListDiv.innerHTML = "<div style='color:#7e7658'>—— none ——</div>";
            else currentData.skills.forEach((sk,idx)=>{ let chip = document.createElement("div"); chip.className="skill-tag"; chip.innerHTML=`${sk} <span data-skill-idx="${idx}" class="remove-skill" style="cursor:pointer;">✖</span>`; skillListDiv.appendChild(chip); });
        }
    }
    
    const canvas = document.getElementById("standWheel");
    let ctx = canvas.getContext("2d");
    function drawWheel(){
        if(!ctx) return;
        let w=canvas.width, h=canvas.height, cx=w/2, cy=h/2, outerR=w*0.4, innerR=w*0.12, angleStep=(Math.PI*2)/STAT_LABELS.length;
        ctx.clearRect(0,0,w,h);
        ctx.beginPath(); ctx.arc(cx,cy,outerR,0,2*Math.PI); ctx.strokeStyle="#d48a2b"; ctx.lineWidth=1.8; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cy,innerR,0,2*Math.PI); ctx.strokeStyle="#5e7a3a"; ctx.lineWidth=1.5; ctx.stroke();
        for(let i=0;i<STAT_LABELS.length;i++){
            let ang = i*angleStep - Math.PI/2;
            let ex = cx+Math.cos(ang)*outerR, ey = cy+Math.sin(ang)*outerR;
            ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ex,ey); ctx.strokeStyle="#5e7a3a"; ctx.stroke();
            for(let lvl=1;lvl<=6;lvl++){
                let t=lvl/6, rad=innerR+(outerR-innerR)*t, lx=cx+Math.cos(ang)*rad, ly=cy+Math.sin(ang)*rad, perp=ang+Math.PI/2, tick=3;
                ctx.beginPath(); ctx.moveTo(lx+Math.cos(perp)*tick, ly+Math.sin(perp)*tick); ctx.lineTo(lx-Math.cos(perp)*tick, ly-Math.sin(perp)*tick); ctx.strokeStyle="#b8975a"; ctx.stroke();
            }
            let labelR=outerR+12; ctx.font="bold 9px 'Montserrat'"; ctx.fillStyle="#cfbe8a"; ctx.fillText(STAT_LABELS[i], cx+Math.cos(ang)*labelR-13, cy+Math.sin(ang)*labelR+4);
            let rank = currentData.wheelStats[STAT_LABELS[i]]||"?";
            let letterR=outerR+26; ctx.font="bold 15px 'Cormorant Garamond'"; ctx.fillStyle=rank==="?"?"#8f8a6e":"#e8b75e"; ctx.fillText(rank, cx+Math.cos(ang)*letterR-8, cy+Math.sin(ang)*letterR+6);
        }
        let pts=[];
        for(let i=0;i<STAT_LABELS.length;i++){
            let rank = currentData.wheelStats[STAT_LABELS[i]]||"?";
            let val=RANK_VALUES[rank]||0, t=val===0?0:val/MAX_RANK, rad=innerR+(outerR-innerR)*t, ang=i*angleStep-Math.PI/2;
            pts.push({x:cx+Math.cos(ang)*rad, y:cy+Math.sin(ang)*rad});
        }
        if(pts.length){
            ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y); ctx.closePath();
            ctx.fillStyle="rgba(212,138,43,0.2)"; ctx.fill(); ctx.strokeStyle="#d48a2b"; ctx.lineWidth=2; ctx.stroke();
            for(let p of pts){ ctx.beginPath(); ctx.arc(p.x,p.y,3,0,2*Math.PI); ctx.fillStyle="#e8b75e"; ctx.fill(); }
        }
        ctx.beginPath(); ctx.arc(cx,cy,innerR-3,0,2*Math.PI); ctx.fillStyle="rgba(8,12,7,0.9)"; ctx.fill(); ctx.strokeStyle="#5e7a3a"; ctx.stroke();
        ctx.font="bold 9px 'Montserrat'"; ctx.fillStyle="#e0aa5e"; let disp=currentData.standName||"STAND"; if(disp.length>10) disp=disp.slice(0,8)+".."; ctx.fillText(disp, cx-18, cy+3);
    }
    
    function buildUserStats(){
        let panel = document.getElementById("userStatsPanel"); if(!panel) return;
        panel.innerHTML="";
        for(let stat of USER_STATS){
            let val = currentData.userStats[stat];
            let div = document.createElement("div"); div.className="user-stat";
            div.innerHTML = `<div class="user-stat-name">${stat}</div><div class="user-stat-value"><button class="user-dec" data-stat="${stat}">-</button><input type="number" id="stat_${stat}" value="${val}" class="user-stat-input"><button class="user-inc" data-stat="${stat}">+</button></div><div class="user-stat-mod">${getMod(val)>=0?`+${getMod(val)}`:getMod(val)}</div>`;
            panel.appendChild(div);
        }
        document.querySelectorAll(".user-dec").forEach(btn=>btn.addEventListener("click",(e)=>{ let s=btn.getAttribute("data-stat"); let nv=(currentData.userStats[s]||10)-1; if(nv<1)nv=1; currentData.userStats[s]=nv; updateSingleUserStat(s); updateUI(); }));
        document.querySelectorAll(".user-inc").forEach(btn=>btn.addEventListener("click",(e)=>{ let s=btn.getAttribute("data-stat"); let nv=(currentData.userStats[s]||10)+1; if(nv>30)nv=30; currentData.userStats[s]=nv; updateSingleUserStat(s); updateUI(); }));
        document.querySelectorAll(".user-stat-input").forEach(inp=>inp.addEventListener("change",(e)=>{ let id=inp.id.replace("stat_",""); let nv=parseInt(inp.value)||10; if(nv<1)nv=1; if(nv>30)nv=30; currentData.userStats[id]=nv; updateSingleUserStat(id); updateUI(); }));
    }
    function updateSingleUserStat(s){ let inp=document.getElementById(`stat_${s}`); if(inp) inp.value=currentData.userStats[s]; let div=inp?.closest(".user-stat"); if(div){ let modSpan=div.querySelector(".user-stat-mod"); modSpan.innerText=getMod(currentData.userStats[s])>=0?`+${getMod(currentData.userStats[s])}`:getMod(currentData.userStats[s]); } }
    function buildWheelControls(){
        let panel = document.getElementById("statsControlPanel"); if(!panel) return;
        panel.innerHTML="";
        for(let label of STAT_LABELS){
            let cur = currentData.wheelStats[label]||"?";
            let div = document.createElement("div"); div.className="stat-control-item";
            div.innerHTML = `<div class="stat-label">${label}</div><select class="stat-value-select" data-stat="${label}">${RANK_LIST.map(r=>`<option value="${r}" ${cur===r?'selected':''}>${r}</option>`).join('')}</select>`;
            panel.appendChild(div);
        }
        document.querySelectorAll(".stat-value-select").forEach(sel=>sel.addEventListener("change",()=>{ let sn=sel.getAttribute("data-stat"); currentData.wheelStats[sn]=sel.value; updateUI(); }));
    }
    function exportChar(){ currentData.name=document.getElementById("charName").value; currentData.hp=parseInt(document.getElementById("hp").value)||0; currentData.energy=parseInt(document.getElementById("energy").value)||0; let tr=document.querySelector('input[name="standType"]:checked'); if(tr) currentData.standType=tr.value; let blob=new Blob([JSON.stringify(currentData,null,2)],{type:"application/json"}); let a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`jojo_${currentData.name||"stand"}.json`; a.click(); URL.revokeObjectURL(a.href); }
    function importFromFile(file){ let reader=new FileReader(); reader.onload=e=>{ try{ let ld=JSON.parse(e.target.result); currentData={...currentData,...ld, wheelStats:{...currentData.wheelStats,...ld.wheelStats}, userStats:{...currentData.userStats,...ld.userStats}}; if(!currentData.skills) currentData.skills=[]; document.getElementById("charName").value=currentData.name; document.getElementById("hp").value=currentData.hp; document.getElementById("energy").value=currentData.energy; document.querySelectorAll('input[name="standType"]').forEach(r=>{if(r.value===currentData.standType) r.checked=true;}); buildWheelControls(); buildUserStats(); updateUI(); document.getElementById("turnMessage").innerHTML="⟡ loaded ⟡"; }catch(e){ alert("corrupted file"); } }; reader.readAsText(file); }
    function resetAll(){ let ew={}; STAT_LABELS.forEach(l=>ew[l]="?"); let eu={}; USER_STATS.forEach(s=>eu[s]=10); currentData={ name:"", standName:"", standType:"close", wheelStats:ew, userStats:eu, hp:0, energy:0, hpMax:0, energyMax:100, skills:[] }; document.getElementById("charName").value=""; document.getElementById("hp").value=0; document.getElementById("energy").value=0; let rb=document.querySelector('input[name="standType"][value="close"]'); if(rb) rb.checked=true; buildWheelControls(); buildUserStats(); updateUI(); document.getElementById("turnMessage").innerHTML="✦ new stand ✦"; }
    function addSkill(){ let a=prompt("ability name:"); if(a?.trim()){ currentData.skills.push(a.trim()); updateUI(); } }
    function nextTurn(){ document.getElementById("turnMessage").innerHTML="◈ ZA WARUDO! ◈"; }
    function removeSkillHandler(e){ if(e.target.classList.contains("remove-skill")){ let idx=parseInt(e.target.getAttribute("data-skill-idx")); if(!isNaN(idx)){ currentData.skills.splice(idx,1); updateUI(); } } }
    function promptStandName(){ let n=prompt("STAND NAME:", currentData.standName||"My Stand"); if(n!==null){ currentData.standName=n.trim()||""; drawWheel(); } }
    
    window.addEventListener('DOMContentLoaded',()=>{
        document.getElementById("exportBtn").addEventListener("click",exportChar);
        document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("fileInput").click());
        document.getElementById("resetBtn").addEventListener("click",resetAll);
        document.getElementById("nextTurnBtn").addEventListener("click",nextTurn);
        document.getElementById("addSkillBtn").addEventListener("click",addSkill);
        document.getElementById("fileInput").addEventListener("change",e=>{ if(e.target.files[0]) importFromFile(e.target.files[0]); e.target.value=""; });
        document.getElementById("skillList").addEventListener("click",removeSkillHandler);
        document.getElementById("charName").addEventListener("input",e=>currentData.name=e.target.value);
        document.getElementById("hp").addEventListener("input",e=>currentData.hp=parseInt(e.target.value)||0);
        document.getElementById("energy").addEventListener("input",e=>currentData.energy=parseInt(e.target.value)||0);
        document.getElementById("meleeType").addEventListener("change",()=>updateUI());
        document.getElementById("rangedProf").addEventListener("change",()=>updateUI());
        document.querySelectorAll('input[name="standType"]').forEach(r=>r.addEventListener("change",()=>{ if(r.checked) currentData.standType=r.value; updateUI(); }));
        document.getElementById("standWheel").addEventListener("dblclick",promptStandName);
        resetAll();
    });
</script>
</body>
</html>
